services:
  # Instant-loading portfolio frontend. Static sites are served from Render's
  # CDN and do not spin down. The API below can still use the Free plan.
  - type: web
    name: medai-pro-instant-demo
    runtime: static
    rootDir: medical-ai-enhanced/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        value: https://medai-pro-portfolio.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: medai-pro-portfolio
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/status
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://medai-pro-instant-demo.onrender.com
      - key: DB_SSL
        value: "true"
      - key: DB_HOST
        value: aws-1-ap-northeast-2.pooler.supabase.com
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        value: postgres.ptktzcnqubwvcplawoqt
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
