services:
  - type: web
    name: medai-pro-portfolio
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/status
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: "true"
      - key: DB_HOST
        value: aws-1-ap-northeast-2.pooler.supabase.com
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        value: postgres.ptktzcnqubwvcplawoqt
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
